# nginx del frontend React (prod). Sirve el SPA y proxya API/archivos/realtime
# al nginx de ERPNext (servicio "frontend" del stack erp-grace, alias bakedata.local).
#
# Mismo origen que el SPA → sin CORS ni cookies cross-site. Réplica del proxy de
# Vite usado en dev (Host=bakedata.local, cookieDomainRewrite).

server {
    listen 80;
    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    # DNS embebido de Docker → resuelve el alias bakedata.local en runtime.
    resolver 127.0.0.11 valid=30s;

    client_max_body_size 25m;

    # API / archivos / assets de ERPNext / realtime → backend.
    # (El SPA emite sus propios assets en /static, no choca con /assets de ERPNext.)
    location ~ ^/(api|files|private|assets|socket\.io)/ {
        set $erp_backend http://bakedata.local:8080;
        proxy_pass $erp_backend;

        proxy_set_header Host              bakedata.local;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Reescribe el dominio de la cookie de sesión al host que usó el navegador.
        proxy_cookie_domain bakedata.local $host;

        # WebSocket (socket.io / realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Impresión: proxy al print-server del HOST de la torre (impresora térmica USB).
    # El navegador llama /print/... (mismo origen) → aquí se reenvía al host:6789.
    # host.docker.internal lo provee compose vía extra_hosts (host-gateway).
    location /print/ {
        proxy_pass http://host.docker.internal:6789/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # SPA: cualquier ruta del cliente cae a index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
